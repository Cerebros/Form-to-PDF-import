<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HearingLife Certificate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --navy:      #0b1f4a;
            --navy-mid:   #163272;
            --navy-light: #1e4096;
            --gold:       #b8963e;
            --gold-light: #d4b060;
            --gold-pale:  #f5ecd4;
            --cream:      #faf8f3;
            --white:      #ffffff;
            --border:     #ddd8cc;
            --muted:      #7a7060;
            --text:       #1a1510;
            --success:    #2d6a4f;
            --error:      #9b2020;
            --radius:     6px;
            --shadow:     0 24px 64px rgba(11,31,74,0.18), 0 4px 16px rgba(11,31,74,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--navy);
            font-family: 'Jost', sans-serif;
            color: var(--text);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 20px 64px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 40% at 90% 10%, rgba(184,150,62,0.15) 0%, transparent 55%),
                radial-gradient(ellipse 60% 60% at 5% 90%,  rgba(30,64,150,0.4)  0%, transparent 55%);
            pointer-events: none;
        }

        .card {
            background: var(--cream);
            border-radius: var(--radius);
            width: 100%;
            max-width: 580px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            animation: rise .5s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes rise { from { opacity:0; transform:translateY(20px); } }

        .card-top {
            background: var(--navy);
            padding: 32px 40px 28px;
            position: relative;
            overflow: hidden;
        }
        .card-top::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
        }

        .top-eyebrow {
            font-size: 10px;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--gold-light);
            font-weight: 500;
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .top-eyebrow::before, .top-eyebrow::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,176,96,.4));
        }

        .card-top h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 30px;
            font-weight: 500;
            color: var(--white);
            line-height: 1.2;
        }
        .card-top p {
            margin-top: 6px;
            font-size: 13px;
            color: rgba(255,255,255,.5);
            font-weight: 300;
        }

        .card-body { padding: 36px 40px 40px; display: flex; flex-direction: column; gap: 28px; }

        .section { display: flex; flex-direction: column; gap: 16px; }
        .section-heading {
            font-size: 9.5px;
            letter-spacing: .18em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--navy-mid);
            display: flex; align-items: center; gap: 10px;
        }
        .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .field { display: flex; flex-direction: column; gap: 6px; }

        label {
            font-size: 11.5px;
            font-weight: 500;
            color: var(--navy);
            letter-spacing: .04em;
        }

        .field-hint {
            font-size: 11px;
            color: var(--muted);
            font-weight: 300;
            margin-top: -2px;
        }

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            color: var(--text);
            background: var(--white);
            outline: none;
            transition: border-color .18s, box-shadow .18s;
            appearance: none;
        }
        input:focus, select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(184,150,62,.14);
        }

        .select-wrap { position: relative; }
        .select-wrap::after {
            content: '▾';
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: var(--gold); font-size: 13px; pointer-events: none;
        }

        .sig-preview {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: var(--gold-pale);
            border: 1px solid rgba(184,150,62,0.3);
            border-radius: 4px;
            font-size: 12px;
            color: var(--navy-mid);
        }
        .sig-preview.visible { display: flex; }
        .sig-preview img { height: 36px; max-width: 160px; object-fit: contain; }

        .add-new-btn {
            background: none;
            border: 1.5px dashed var(--border);
            border-radius: 4px;
            color: var(--navy-mid);
            font-family: 'Jost', sans-serif;
            font-size: 12.5px;
            padding: 9px 14px;
            cursor: pointer;
            width: 100%;
            transition: all .18s;
        }
        .add-new-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(184,150,62,0.04); }

        .new-signer-panel {
            display: none;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            background: rgba(11,31,74,0.04);
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .new-signer-panel.open { display: flex; }

        .sig-method-tabs { display: flex; border: 1.5px solid var(--border); border-radius: 4px; overflow: hidden; }
        .sig-method-tab {
            flex: 1; padding: 8px; background: var(--white); border: none; font-family: 'Jost'; cursor: pointer;
        }
        .sig-method-tab.active { background: var(--navy); color: var(--gold-light); }

        canvas { width: 100%; height: 100px; background: #fff; border: 1px solid var(--border); display: none; }
        canvas.visible { display: block; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .generate-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
            border: none; border-radius: 4px;
            font-family: 'Jost'; font-weight: 600;
            text-transform: uppercase; color: var(--gold-light); cursor: pointer;
        }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status { text-align: center; font-size: 13px; min-height: 20px; margin-top: 10px; }
        .status.success { color: var(--success); }
        .status.error { color: var(--error); }
    </style>
</head>
<body>

<div class="card">
    <div class="card-top">
        <div class="top-eyebrow">HearingLife Canada</div>
        <h1>Certificate Generator</h1>
        <p>Life Changer Awards · Client Excellence Program</p>
    </div>

    <div class="card-body">
        <div class="section">
            <div class="section-heading">Certificate</div>
            <div class="field">
                <label>Certificate Type</label>
                <div class="select-wrap">
                    <select id="certType">
                        <option value="" disabled selected>— Select a certificate —</option>
                        <option value="2026 -5 Year Life Changer Awards Certificate">2026 · 5 Year Life Changer Award</option>
                        <option value="2026 -10 Year Life Changer Awards Certificate">2026 · 10 Year Life Changer Award</option>
                        <option value="2026 -15 Year Life Changer Awards Certificate">2026 · 15 Year Life Changer Award</option>
                        <option value="2026 -20 Year Life Changer Awards Certificate">2026 · 20 Year Life Changer Award</option>
                        <option value="2026 -25 Year Life Changer Awards Certificate">2026 · 25 Year Life Changer Award</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-heading">Recipient</div>
            <div class="two-col">
                <div class="field">
                    <label>Award Winner</label>
                    <input type="text" id="awardWinner" placeholder="Full name"/>
                </div>
                <div class="field">
                    <label>Date</label>
                    <input type="date" id="certDate"/>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-heading">Signatures</div>
            
            <div class="field">
                <label>DSD — Divisional Sales Director</label>
                <div class="select-wrap">
                    <select id="dsdSelect" onchange="onSignerSelect('dsd')">
                        <option value="" disabled selected>— Select DSD —</option>
                    </select>
                </div>
                <div class="sig-preview" id="dsdPreview">
                    <img id="dsdSigImg" src="" alt="Signature"/>
                    <span id="dsdSigName"></span>
                </div>
                <button class="add-new-btn" onclick="togglePanel('dsd')">+ Add new DSD</button>
                <div class="new-signer-panel" id="dsdPanel">
                    <input type="text" id="dsdNewName" placeholder="Full Name"/>
                    <div class="sig-method-tabs">
                        <button class="sig-method-tab active" onclick="setMethod('dsd','upload')">Upload</button>
                        <button class="sig-method-tab" onclick="setMethod('dsd','draw')">Draw</button>
                    </div>
                    <div id="dsdUploadArea"><input type="file" id="dsdSigFile" accept="image/*"></div>
                    <canvas id="dsdCanvas"></canvas>
                    <button class="generate-btn" style="padding:8px" onclick="saveSigner('dsd')">Save Signer</button>
                </div>
            </div>

            <div class="field">
                <label>RM — Regional Manager</label>
                <div class="select-wrap">
                    <select id="rmSelect" onchange="onSignerSelect('rm')">
                        <option value="" disabled selected>— Select RM —</option>
                    </select>
                </div>
                <div class="sig-preview" id="rmPreview">
                    <img id="rmSigImg" src="" alt="Signature"/>
                    <span id="rmSigName"></span>
                </div>
                <button class="add-new-btn" onclick="togglePanel('rm')">+ Add new RM</button>
                <div class="new-signer-panel" id="rmPanel">
                    <input type="text" id="rmNewName" placeholder="Full Name"/>
                    <div class="sig-method-tabs">
                        <button class="sig-method-tab active" onclick="setMethod('rm','upload')">Upload</button>
                        <button class="sig-method-tab" onclick="setMethod('rm','draw')">Draw</button>
                    </div>
                    <div id="rmUploadArea"><input type="file" id="rmSigFile" accept="image/*"></div>
                    <canvas id="rmCanvas"></canvas>
                    <button class="generate-btn" style="padding:8px" onclick="saveSigner('rm')">Save Signer</button>
                </div>
            </div>
        </div>

        <div class="section">
            <button class="generate-btn" id="generateBtn" onclick="generatePDF()">Generate Certificate</button>
            <div class="status" id="status"></div>
        </div>
    </div>
</div>

<script>
    const PRELOADED = {
        dsd: ['Kelley Keene', 'Lynn Veld', 'Neda Chelehmalzadeh', 'Philippe Nobert', 'Rhian Holmes', 'Angelo Farneti', 'Jessica Quinn'],
        rm: ['Adele Gouthro', 'Cassandra Beach', 'Chelsea KuhnGrise', 'Courtney Bell', 'Jade Smolenaars', 'Jennifer Vosper', 'Jessica Quinn', 'Jillian Mills', 'Jory Martin', 'Kevin Daoust', 'Sonia Miceli']
    };

    let signers = { dsd: [], rm: [] };
    let selected = { dsd: null, rm: null };
    let canvasCtx = {};

    function init() {
        const saved = JSON.parse(localStorage.getItem('hl_signers') || '{"dsd":[], "rm":[]}');
        ['dsd', 'rm'].forEach(role => {
            const base = PRELOADED[role].map(name => {
                const found = saved[role].find(s => s.name === name);
                return found ? found : { name, sig: null };
            });
            signers[role] = base;
        });
        refreshDropdowns();
        initCanvases();
        document.getElementById('certDate').valueAsDate = new Date();
    }

    function refreshDropdowns() {
        ['dsd', 'rm'].forEach(role => {
            const sel = document.getElementById(role + 'Select');
            sel.innerHTML = `<option value="" disabled selected>— Select ${role.toUpperCase()} —</option>`;
            signers[role].forEach((s, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = s.name + (s.sig ? ' ✓' : '');
                sel.appendChild(opt);
            });
        });
    }

    function onSignerSelect(role) {
        const idx = document.getElementById(role + 'Select').value;
        selected[role] = idx;
        const s = signers[role][idx];
        const prev = document.getElementById(role + 'Preview');
        document.getElementById(role + 'SigName').textContent = s.name;
        const img = document.getElementById(role + 'SigImg');
        if (s.sig) { img.src = s.sig; img.style.display = 'block'; }
        else { img.style.display = 'none'; }
        prev.classList.add('visible');
    }

    function togglePanel(role) {
        document.getElementById(role + 'Panel').classList.toggle('open');
    }

    function setMethod(role, method) {
        const isUpload = method === 'upload';
        document.getElementById(role + 'UploadArea').style.display = isUpload ? 'block' : 'none';
        document.getElementById(role + 'Canvas').classList.toggle('visible', !isUpload);
        document.querySelectorAll(`#${role}Panel .sig-method-tab`).forEach((btn, i) => {
            btn.classList.toggle('active', (i === 0 && isUpload) || (i === 1 && !isUpload));
        });
    }

    function initCanvases() {
        ['dsd', 'rm'].forEach(role => {
            const canvas = document.getElementById(role + 'Canvas');
            const ctx = canvas.getContext('2d');
            canvasCtx[role] = ctx;
            let drawing = false;

            const getPos = e => {
                const r = canvas.getBoundingClientRect();
                return { x: e.clientX - r.left, y: e.clientY - r.top };
            };

            canvas.onpointerdown = e => { 
                drawing = true; 
                ctx.beginPath(); 
                const p = getPos(e); 
                ctx.moveTo(p.x, p.y); 
            };
            canvas.onpointermove = e => { 
                if(!drawing) return; 
                const p = getPos(e); 
                ctx.lineTo(p.x, p.y); 
                ctx.stroke(); 
            };
            window.addEventListener('pointerup', () => drawing = false);
        });
    }

    async function saveSigner(role) {
        const name = document.getElementById(role + 'NewName').value;
        if (!name) return alert("Enter a name");

        let sig = null;
        const isUpload = document.getElementById(role + 'UploadArea').style.display !== 'none';

        if (isUpload) {
            const file = document.getElementById(role + 'SigFile').files[0];
            if (file) {
                sig = await new Promise(r => { 
                    const fr = new FileReader(); 
                    fr.onload = e => r(e.target.result); 
                    fr.readAsDataURL(file); 
                });
            }
        } else {
            sig = document.getElementById(role + 'Canvas').toDataURL();
        }

        const existingIdx = signers[role].findIndex(s => s.name === name);
        if (existingIdx > -1) signers[role][existingIdx].sig = sig;
        else signers[role].push({ name, sig });

        localStorage.setItem('hl_signers', JSON.stringify(signers));
        refreshDropdowns();
        togglePanel(role);
        setStatus(`Signer ${name} saved!`, 'success');
    }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status ' + type;
        if(type === 'success') setTimeout(() => el.textContent = "", 5000);
    }

    async function generatePDF() {
        const type = document.getElementById('certType').value;
        const winner = document.getElementById('awardWinner').value;
        if(!type || !winner || selected.dsd === null || selected.rm === null) {
            return setStatus("Please fill all fields and select signers.", "error");
        }

        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        setStatus("Creating PDF...", "");

        try {
            const url = encodeURIComponent(type) + '.pdf';
            const bytes = await fetch(url).then(res => res.arrayBuffer());
            const pdfDoc = await PDFLib.PDFDocument.load(bytes);
            const form = pdfDoc.getForm();

            const dVal = document.getElementById('certDate').value;
            const dateStr = new Date(dVal + 'T12:00:00').toLocaleDateString('en-CA', { year:'numeric', month:'long', day:'numeric'});

            form.getTextField('Award Winner').setText(winner);
            form.getTextField('Date').setText(dateStr);
            form.getTextField('DSD').setText(signers.dsd[selected.dsd].name);
            form.getTextField('RM').setText(signers.rm[selected.rm].name);

            // Overlay Signatures
            const page = pdfDoc.getPages()[0];
            const embed = async (role, fieldName) => {
                const data = signers[role][selected[role]].sig;
                if (!data) return;
                const img = data.includes('png') ? await pdfDoc.embedPng(data) : await pdfDoc.embedJpg(data);
                const field = form.getTextField(fieldName).acroField.getWidgets()[0].getRectangle();
                const dims = img.scaleToFit(field.width, field.height * 2);
                page.drawImage(img, {
                    x: field.x + (field.width - dims.width)/2,
                    y: field.y,
                    width: dims.width,
                    height: dims.height
                });
            };

            await embed('dsd', 'DSD');
            await embed('rm', 'RM');

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Certificate_${winner.replace(/\s+/g, '_')}.pdf`;
            link.click();
            setStatus("Success!", "success");
        } catch (e) {
            setStatus("Error: Template not found in folder.", "error");
            console.error(e);
        }
        btn.disabled = false;
    }

    init();
</script>
</body>
</html>
