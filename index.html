<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HearingLife Certificate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --navy: #0b1f4a; --navy-mid: #163272; --gold: #b8963e; --gold-light: #d4b060;
            --gold-pale: #f5ecd4; --cream: #faf8f3; --white: #ffffff; --border: #ddd8cc;
            --muted: #7a7060; --text: #1a1510; --success: #2d6a4f; --error: #9b2020;
            --radius: 6px; --shadow: 0 24px 64px rgba(11,31,74,0.18);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: var(--navy); font-family: 'Jost', sans-serif; color: var(--text); display: flex; align-items: flex-start; justify-content: center; padding: 48px 20px; }
        .card { background: var(--cream); border-radius: var(--radius); width: 100%; max-width: 580px; box-shadow: var(--shadow); overflow: hidden; }
        .card-top { background: var(--navy); padding: 32px 40px; border-bottom: 3px solid var(--gold); }
        .card-top h1 { font-family: 'Cormorant Garamond', serif; font-size: 30px; color: var(--white); }
        .card-body { padding: 36px 40px; display: flex; flex-direction: column; gap: 28px; }
        .section { display: flex; flex-direction: column; gap: 16px; }
        .section-heading { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; font-weight: 600; color: var(--navy-mid); display: flex; align-items: center; gap: 10px; }
        .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11.5px; font-weight: 500; color: var(--navy); }
        input, select { width: 100%; padding: 11px; border: 1.5px solid var(--border); border-radius: 4px; font-family: 'Jost'; font-size: 14px; }
        .sig-preview { display: none; align-items: center; gap: 12px; padding: 10px; background: var(--gold-pale); border-radius: 4px; margin-top: 8px; }
        .sig-preview.visible { display: flex; }
        .sig-preview img { height: 40px; max-width: 150px; object-fit: contain; }
        .generate-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--navy), var(--navy-mid)); border: none; border-radius: 4px; color: var(--gold-light); font-weight: 600; text-transform: uppercase; cursor: pointer; }
        .generate-btn:disabled { opacity: 0.5; }
        .status { text-align: center; font-size: 13px; margin-top: 10px; min-height: 1.2em; }
        .success { color: var(--success); } .error { color: var(--error); }
    </style>
</head>
<body>

<div class="card">
    <div class="card-top">
        <h1>Certificate Generator</h1>
        <p style="color: rgba(255,255,255,0.6)">Life Changer Awards · 2026 Milestone Program</p>
    </div>

    <div class="card-body">
        <div class="section">
            <div class="section-heading">Certificate</div>
            <div class="field">
                <label>Service Milestone</label>
                <select id="certType">
                    <option value="2026 -5 Year Life Changer Award">5 Year Award</option>
                    <option value="2026 -10 Year Life Changer Award">10 Year Award</option>
                    <option value="2026 -15 Year Life Changer Award">15 Year Award</option>
                    <option value="2026 -20 Year Life Changer Award">20 Year Award</option>
                    <option value="2026 -25 Year Life Changer Award">25 Year Award</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-heading">Recipient</div>
            <div class="field"><label>Award Winner</label><input type="text" id="awardWinner" placeholder="Full name"/></div>
            <div class="field"><label>Presentation Date</label><input type="date" id="certDate"/></div>
        </div>

        <div class="section">
            <div class="section-heading">Signatures</div>
            <div class="field">
                <label>Divisional Sales Director (DSD)</label>
                <select id="dsdSelect" onchange="onSignerSelect('dsd')"></select>
                <div class="sig-preview" id="dsdPreview"><img id="dsdSigImg" src=""/><span id="dsdSigName"></span></div>
            </div>
            <div class="field">
                <label>Regional Manager (RM)</label>
                <select id="rmSelect" onchange="onSignerSelect('rm')"></select>
                <div class="sig-preview" id="rmPreview"><img id="rmSigImg" src=""/><span id="rmSigName"></span></div>
            </div>
        </div>

        <button class="generate-btn" id="generateBtn" onclick="generatePDF()">Download Certificate</button>
        <div class="status" id="status"></div>
    </div>
</div>

<script>
    // Exact mapping of names to extensions as seen in your GitHub screenshot
    const NAMES = {
        dsd: [
            { name: 'Kelley Keene', ext: 'jpg' },
            { name: 'Lynn Veld', ext: 'jpg' },
            { name: 'Neda Chelehmalzadeh', ext: 'png' },
            { name: 'Philippe Nobert', ext: 'png' },
            { name: 'Rhian Holmes', ext: 'PNG' },
            { name: 'Angelo Farneti', ext: 'png' },
            { name: 'Jessica Quinn', ext: 'PNG' }
        ],
        rm: [
            { name: 'Adele Gouthro', ext: 'jpg' },
            { name: 'Cassandra Beach', ext: 'jpg' },
            { name: 'Chelsea Kuhn-Grise', ext: 'jpg' },
            { name: 'Courtney Bell', ext: 'jpeg' },
            { name: 'Jade Smolenaars', ext: 'jpg' },
            { name: 'Jennifer Vosper', ext: 'png' },
            { name: 'Jessica Quinn', ext: 'PNG' },
            { name: 'Jillian Mills', ext: 'PNG' },
            { name: 'Jory Martin', ext: 'png' },
            { name: 'Kevin Daoust', ext: 'png' },
            { name: 'Sonia Miceli', ext: 'tif' }
        ]
    };

    let signers = { dsd: [], rm: [] };
    let selected = { dsd: null, rm: null };

    async function loadLocalSignature(person) {
        try {
            const url = `${encodeURIComponent(person.name)}.${person.ext}`;
            const response = await fetch(url);
            if (!response.ok) return null;
            const blob = await response.blob();
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        } catch (e) {
            console.warn(`Could not load signature for ${person.name}`);
            return null; 
        }
    }

    async function init() {
        document.getElementById('certDate').valueAsDate = new Date();
        
        // Loop through and load signatures individually
        for (let role of ['dsd', 'rm']) {
            const list = NAMES[role];
            for (let person of list) {
                const sigData = await loadLocalSignature(person);
                signers[role].push({ 
                    name: person.name, 
                    sig: sigData, 
                    ext: person.ext 
                });
            }
        }
        refreshDropdowns();
    }

    function refreshDropdowns() {
        ['dsd', 'rm'].forEach(role => {
            const sel = document.getElementById(role + 'Select');
            sel.innerHTML = `<option value="" disabled selected>— Select ${role.toUpperCase()} —</option>`;
            signers[role].forEach((s, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                // Add a checkmark if the signature image actually loaded
                opt.textContent = s.name + (s.sig ? ' ✓' : ' (Image missing)');
                sel.appendChild(opt);
            });
        });
    }

    function onSignerSelect(role) {
        const idx = document.getElementById(role + 'Select').value;
        selected[role] = idx;
        const s = signers[role][idx];
        const prev = document.getElementById(role + 'Preview');
        document.getElementById(role + 'SigName').textContent = s.name;
        const img = document.getElementById(role + 'SigImg');
        if (s.sig) { 
            img.src = s.sig; 
            img.style.display = 'block'; 
        } else { 
            img.style.display = 'none'; 
        }
        prev.classList.add('visible');
    }

   async function generatePDF() {
    const type = document.getElementById('certType').value;
    const winner = document.getElementById('awardWinner').value;
    if(!winner || selected.dsd === null || selected.rm === null) {
        return setStatus("Please fill all fields.", "error");
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    setStatus("Generating PDF...", "");

    try {
        const response = await fetch(`${encodeURIComponent(type)}.pdf`);
        if(!response.ok) throw new Error("Template PDF not found");
        const bytes = await response.arrayBuffer();
        
        const pdfDoc = await PDFLib.PDFDocument.load(bytes);
        const page = pdfDoc.getPages()[0];
        const { width, height } = page.getSize();

        const dVal = document.getElementById('certDate').value;
        const dateStr = new Date(dVal + 'T12:00:00').toLocaleDateString('en-CA', { 
            year:'numeric', month:'long', day:'numeric'
        });

        // 1. DYNAMIC CENTERING FOR WINNER NAME
        const fontSize = 42; // Slightly larger for impact
        const font = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
        const textWidth = font.widthOfTextAtSize(winner, fontSize);
        const centerX = (width - textWidth) / 2;

        // Positioned in the white space above the "In recognition..." text
        page.drawText(winner, { 
            x: centerX, 
            y: height - 230, 
            size: fontSize, 
            font: font,
            color: PDFLib.rgb(0.04, 0.12, 0.29) 
        });

        // 2. BOTTOM ALIGNMENT (Date, Names, and Signatures)
        const labelY = 70; // Position for the printed names below the lines
        const sigY = 85;   // Position for the signature images to sit ON the lines

        // Printed Names & Date
        page.drawText(signers.dsd[selected.dsd].name, { x: 310, y: labelY, size: 10 });
        page.drawText(signers.rm[selected.rm].name, { x: 535, y: labelY, size: 10 });
        page.drawText(dateStr, { x: 520, y: 35, size: 11 }); // Date near the bottom "Date" label

        // 3. EMBED SIGNATURES
        const embed = async (role, x) => {
            const s = signers[role][selected[role]];
            if (!s.sig) return;
            
            let img;
            const extension = s.ext.toLowerCase();
            if (extension === 'png') {
                img = await pdfDoc.embedPng(s.sig);
            } else if (extension === 'jpg' || extension === 'jpeg') {
                img = await pdfDoc.embedJpg(s.sig);
            } else { return; }

            const dims = img.scaleToFit(140, 55);
            page.drawImage(img, { 
                x: x, 
                y: sigY, 
                width: dims.width, 
                height: dims.height 
            });
        };

        // Aligning signatures with the Divisional Sales Director and Regional Manager lines
        await embed('dsd', 310);
        await embed('rm', 535);

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Certificate_${winner.replace(/\s+/g, '_')}.pdf`;
        link.click();
        setStatus("Success!", "success");
    } catch (e) {
        setStatus("Error: Check file names or console.", "error");
        console.error(e);
    }
    btn.disabled = false;
}

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status ' + type;
    }

    init();
</script>
</body>
</html>
